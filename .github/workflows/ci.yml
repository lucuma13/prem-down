---
name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false # no dependencies, nothing to cache
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Lint each target GOOS so platform-tagged files (integrate_darwin.go,
        # integrate_windows.go) are checked; a single host-GOOS run skips them.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          for goos in darwin windows linux; do
            echo "::group::golangci-lint GOOS=$goos"
            GOOS=$goos "$(go env GOPATH)/bin/golangci-lint" run --enable=revive,gocritic,gosec ./...
            echo "::endgroup::"
          done
      - name: go mod tidy check
        run: go mod tidy -diff
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - name: cross-compile check
        run: |
          GOOS=darwin  GOARCH=arm64 go build ./...
          GOOS=darwin  GOARCH=amd64 go build ./...
          GOOS=windows GOARCH=amd64 go build ./...
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate GitHub workflow schemas
        uses: dsanders11/json-schema-validate-action@eddf079f55830cc9a916a3c512ba9086240d2fea # v2.0.0
        with:
          schema: https://json.schemastore.org/github-workflow.json
          files: .github/workflows/**.yml
      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
      - name: Audit CI workflows (zizmor)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
  installer:
    name: Windows installer check
    needs: [lint, audit]
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build MSI
        shell: bash
        run: |
          go build -o dist/prem-down.exe ./cmd/prem-down
          dotnet tool install --global wix --version "7.*"
          wix eula accept wix7
          wix build packaging/windows/prem-down.wxs -arch x64 \
            -d Version=0.0.1 -d ExeDir=dist -o prem-down.msi
      - name: Install MSI and verify
        shell: pwsh
        run: |
          $p = Start-Process msiexec -ArgumentList '/i','prem-down.msi','/qn' -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "msiexec /i exited with $($p.ExitCode)" }
          $exe = 'C:\Program Files\prem-down\prem-down.exe'
          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw 'installed exe does not run' }
          reg query 'HKLM\SOFTWARE\Classes\SystemFileAssociations\.prproj\shell\prem-down\command'
          if ($LASTEXITCODE -ne 0) { throw 'context-menu registry key missing after install' }
      - name: Exercise integrate subcommand (HKCU wiring)
        shell: pwsh
        run: |
          $exe = 'C:\Program Files\prem-down\prem-down.exe'
          & $exe integrate
          if ($LASTEXITCODE -ne 0) { throw 'integrate failed' }
          reg query 'HKCU\Software\Classes\SystemFileAssociations\.prproj\shell\prem-down\command'
          if ($LASTEXITCODE -ne 0) { throw 'HKCU context-menu key missing after integrate' }
          & $exe integrate --remove
          if ($LASTEXITCODE -ne 0) { throw 'integrate --remove failed' }
          reg query 'HKCU\Software\Classes\SystemFileAssociations\.prproj\shell\prem-down' 2>$null
          if ($LASTEXITCODE -eq 0) { throw 'HKCU context-menu key still present after --remove' }
          # The reg query above exits 1 (key absent) as the success case; reset so
          # the pwsh step doesn't inherit that non-zero code as its own exit status.
          exit 0
      - name: Uninstall MSI and verify cleanup
        shell: pwsh
        run: |
          $p = Start-Process msiexec -ArgumentList '/x','prem-down.msi','/qn' -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "msiexec /x exited with $($p.ExitCode)" }
          if (Test-Path 'C:\Program Files\prem-down\prem-down.exe') { throw 'exe still present after uninstall' }
          reg query 'HKLM\SOFTWARE\Classes\SystemFileAssociations\.prproj\shell\prem-down' 2>$null
          if ($LASTEXITCODE -eq 0) { throw 'context-menu registry key still present after uninstall' }
          # As above: the absent-key reg query exits 1 as success; reset the step's exit code.
          exit 0
  test:
    name: Tests (${{ matrix.os }})
    needs: [lint, audit]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Run test suite
        shell: bash
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        if: matrix.os == 'macos-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.out
          fail_ci_if_error: false
