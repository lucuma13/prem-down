---
name: Release
run-name: Release ${{ github.ref_name }}
on:
  push:
    tags: ["[0-9]*"]
permissions: {}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: test
        run: go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=winget
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
  # Windows ships as an MSI installer so the Explorer context menu, PATH entry
  # and uninstaller come with the package. GoReleaser builds neither the Windows
  # binary nor MSIs, so this job does both: it compiles the Windows exe, wraps
  # it with WiX (packaging/windows/prem-down.wxs), publishes the MSI as a
  # release asset (the direct-download path for editors without winget), and
  # opens the manifest PR against microsoft/winget-pkgs.
  windows-installer:
    name: Windows installer
    needs: [release]
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
      MSI: prem-down_installer_windows_v${{ github.ref_name }}.msi
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build Windows binary
        shell: bash
        run: |
          # Mirrors the GoReleaser build flags in .goreleaser.yaml; the icon is
          # embedded automatically from the committed rsrc_windows_amd64.syso.
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -trimpath -ldflags "-s -w -X main.version=$TAG" \
            -o dist/prem-down.exe ./cmd/prem-down
      - name: Build MSI
        shell: bash
        run: |
          dotnet tool install --global wix --version "7.*"
          wix eula accept wix7
          # MSI ProductVersion must be numeric x.y.z; tags may be shorter (0.4).
          IFS=. read -r major minor patch _ <<<"$TAG"
          wix build packaging/windows/prem-down.wxs -arch x64 \
            -d Version="${major:-0}.${minor:-0}.${patch:-0}" -d ExeDir=dist \
            -o "$MSI"
      - name: Upload MSI to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "$MSI"
      - name: Read ProductCode from the MSI
        shell: pwsh
        run: |
          $installer = New-Object -ComObject WindowsInstaller.Installer
          $openArgs = @("$PWD\$env:MSI", 0)
          $db = $installer.GetType().InvokeMember('OpenDatabase', 'InvokeMethod', $null, $installer, $openArgs)
          $query = "SELECT Value FROM Property WHERE Property='ProductCode'"
          $view = $db.GetType().InvokeMember('OpenView', 'InvokeMethod', $null, $db, @($query))
          $view.GetType().InvokeMember('Execute', 'InvokeMethod', $null, $view, $null)
          $record = $view.GetType().InvokeMember('Fetch', 'InvokeMethod', $null, $view, $null)
          $productCode = $record.GetType().InvokeMember('StringData', 'GetProperty', $null, $record, 1)
          if (-not $productCode) { throw 'ProductCode not found in MSI' }
          "PRODUCT_CODE=$productCode" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: Open winget-pkgs pull request
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
        run: |
          sha256=$(sha256sum "$MSI" | cut -d' ' -f1)
          gh repo sync lucuma13/winget-pkgs --source microsoft/winget-pkgs
          gh auth setup-git
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/lucuma13/winget-pkgs wp
          cd wp
          git sparse-checkout set "manifests/l/lucuma13/prem-down"
          dest="manifests/l/lucuma13/prem-down/$TAG"
          mkdir -p "$dest"
          for f in ../packaging/winget/*.yaml; do
            sed -e "s/__VERSION__/$TAG/g" \
                -e "s/__SHA256__/$sha256/g" \
                -e "s/__PRODUCT_CODE__/$PRODUCT_CODE/g" \
                "$f" > "$dest/$(basename "$f")"
          done
          git config user.name "goreleaser-bot"
          git config user.email "goreleaser-bot@users.noreply.github.com"
          git checkout -b "prem-down-$TAG"
          git add "$dest"
          git commit -m "New version: lucuma13.prem-down version $TAG"
          git push origin "prem-down-$TAG"
          gh pr create --repo microsoft/winget-pkgs \
            --head "lucuma13:prem-down-$TAG" \
            --title "New version: lucuma13.prem-down version $TAG" \
            --body "Automated submission from https://github.com/lucuma13/prem-down/releases/tag/$TAG"
  # macOS ships an optional .pkg installer alongside the Homebrew cask, for
  # non-technical users who would rather not touch a terminal: it drops a
  # universal prem-down binary in /usr/local/bin (on the default PATH) and its
  # postinstall installs the Finder Quick Action for the logged-in user. It is
  # unsigned, so first open needs the Gatekeeper override (see the README); the
  # cask stays the frictionless path. GoReleaser only builds the tarballs (for
  # the cask), so this job builds the universal binary and wraps it with
  # pkgbuild (packaging/macos/scripts/postinstall).
  macos-installer:
    name: macOS installer
    needs: [release]
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
      PKG: prem-down_installer_macos_v${{ github.ref_name }}.pkg
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build universal binary
        run: |
          # Mirrors the GoReleaser build flags in .goreleaser.yaml, then lipo the
          # two arch slices into one binary that runs on Intel and Apple Silicon.
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=darwin GOARCH="$arch" go build \
              -trimpath -ldflags "-s -w -X main.version=$TAG" \
              -o "build-$arch" ./cmd/prem-down
          done
          mkdir -p payload/usr/local/bin
          lipo -create -output payload/usr/local/bin/prem-down build-amd64 build-arm64
          chmod +x payload/usr/local/bin/prem-down
      - name: Build .pkg
        run: |
          # pkgbuild makes the component; productbuild wraps it so Installer.app
          # titles the window from distribution.xml, not the filename. The
          # com.apple.provenance xattrs on the payload surface as AppleDouble
          # entries in the component's listing, but installd merges them back
          # into xattrs on extraction, so the installed tree is just the binary.
          chmod +x packaging/macos/scripts/postinstall
          pkgbuild --root payload --scripts packaging/macos/scripts \
            --identifier com.lucuma13.prem-down --version "$TAG" \
            --install-location / component.pkg
          productbuild --distribution packaging/macos/distribution.xml \
            --resources packaging/macos/resources \
            --package-path . "$PKG"
      - name: Upload .pkg to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "$PKG"
