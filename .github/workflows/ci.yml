---
name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false # no dependencies, nothing to cache
      - name: go vet
        run: go vet ./...
      - name: go mod tidy check
        run: go mod tidy -diff
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - name: cross-compile check
        run: |
          GOOS=darwin  GOARCH=arm64 go build ./...
          GOOS=darwin  GOARCH=amd64 go build ./...
          GOOS=windows GOARCH=amd64 go build ./...
  golangci:
    name: golangci-lint (${{ matrix.goos }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Lint each target GOOS so platform-tagged files are checked.
        goos: [darwin, windows, linux]
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      # install-only puts the pinned golangci-lint on PATH (the action itself
      # only runs `golangci-lint run`, so we invoke run + fmt ourselves).
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          install-only: true
      - name: golangci-lint
        env:
          GOOS: ${{ matrix.goos }}
        run: golangci-lint run --enable=revive,gocritic,gosec ./...
      - name: gofumpt formatting
        env:
          GOOS: ${{ matrix.goos }}
        run: golangci-lint fmt --enable=gofumpt --diff ./...
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate GitHub workflow schemas
        uses: dsanders11/json-schema-validate-action@eddf079f55830cc9a916a3c512ba9086240d2fea # v2.0.0
        with:
          schema: https://json.schemastore.org/github-workflow.json
          files: .github/workflows/**.yml
      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
      - name: Audit CI workflows (zizmor)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
  installer:
    name: Windows installer check
    needs: [lint, golangci, audit]
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build MSI
        shell: bash
        run: |
          go build -o dist/prem-down.exe ./cmd/prem-down
          dotnet tool install --global wix --version "7.*"
          wix eula accept wix7
          wix build packaging/windows/prem-down.wxs -arch x64 \
            -d Version=0.0.1 -d ExeDir=dist -o prem-down.msi
      - name: Install MSI and verify
        shell: pwsh
        run: |
          $p = Start-Process msiexec -ArgumentList '/i','prem-down.msi','/qn' -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "msiexec /i exited with $($p.ExitCode)" }
          $exe = 'C:\Program Files\prem-down\prem-down.exe'
          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw 'installed exe does not run' }
          reg query 'HKLM\SOFTWARE\Classes\SystemFileAssociations\.prproj\shell\prem-down\DropTarget' /v CLSID
          if ($LASTEXITCODE -ne 0) { throw 'context-menu DropTarget CLSID missing after install' }
          reg query 'HKLM\SOFTWARE\Classes\CLSID\{4D9F2A18-7C3B-4E6A-B1F5-2A8C6D0E9F34}\LocalServer32'
          if ($LASTEXITCODE -ne 0) { throw 'COM LocalServer registration missing after install' }
      - name: Smoke-test COM server activation (-Embedding)
        shell: pwsh
        run: |
          $p = Start-Process 'C:\Program Files\prem-down\prem-down.exe' -ArgumentList '-Embedding' -PassThru
          Start-Sleep -Seconds 3
          if ($p.HasExited) { throw "COM server exited during startup/registration (exit code $($p.ExitCode))" }
          Stop-Process -Id $p.Id -Force
      - name: Exercise integrate subcommand (HKCU wiring)
        shell: pwsh
        run: |
          $exe = 'C:\Program Files\prem-down\prem-down.exe'
          & $exe integrate
          if ($LASTEXITCODE -ne 0) { throw 'integrate failed' }
          reg query 'HKCU\Software\Classes\SystemFileAssociations\.prproj\shell\prem-down\DropTarget' /v CLSID
          if ($LASTEXITCODE -ne 0) { throw 'HKCU DropTarget CLSID missing after integrate' }
          reg query 'HKCU\Software\Classes\CLSID\{4D9F2A18-7C3B-4E6A-B1F5-2A8C6D0E9F34}\LocalServer32'
          if ($LASTEXITCODE -ne 0) { throw 'HKCU COM LocalServer registration missing after integrate' }
          & $exe integrate --remove
          if ($LASTEXITCODE -ne 0) { throw 'integrate --remove failed' }
          reg query 'HKCU\Software\Classes\SystemFileAssociations\.prproj\shell\prem-down' 2>$null
          if ($LASTEXITCODE -eq 0) { throw 'HKCU context-menu key still present after --remove' }
          reg query 'HKCU\Software\Classes\CLSID\{4D9F2A18-7C3B-4E6A-B1F5-2A8C6D0E9F34}' 2>$null
          if ($LASTEXITCODE -eq 0) { throw 'HKCU CLSID registration still present after --remove' }
          # The absent-key reg queries above exit 1 (key absent) as the success case;
          # reset so the pwsh step doesn't inherit that non-zero code as its exit status.
          exit 0
      - name: Uninstall MSI and verify cleanup
        shell: pwsh
        run: |
          $p = Start-Process msiexec -ArgumentList '/x','prem-down.msi','/qn' -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "msiexec /x exited with $($p.ExitCode)" }
          if (Test-Path 'C:\Program Files\prem-down\prem-down.exe') { throw 'exe still present after uninstall' }
          reg query 'HKLM\SOFTWARE\Classes\SystemFileAssociations\.prproj\shell\prem-down' 2>$null
          if ($LASTEXITCODE -eq 0) { throw 'context-menu registry key still present after uninstall' }
          reg query 'HKLM\SOFTWARE\Classes\CLSID\{4D9F2A18-7C3B-4E6A-B1F5-2A8C6D0E9F34}' 2>$null
          if ($LASTEXITCODE -eq 0) { throw 'COM CLSID registration still present after uninstall' }
          # As above: the absent-key reg queries exit 1 as success; reset the step's exit code.
          exit 0
  test:
    name: Tests (${{ matrix.os }})
    needs: [lint, golangci, audit]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Run test suite
        shell: bash
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        if: matrix.os == 'macos-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.out
          fail_ci_if_error: false
